<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Promoção Exclusiva Dolce Gusto - 40% OFF em cápsulas e máquinas selecionadas. Aproveite por tempo limitado!">
    <title>Dolce Gusto - Promoção Exclusiva 40% OFF</title>
    
    <!-- Preconnect para fontes externas para melhorar o LCP -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-dark: #2c1810;
            --accent-pink: #e91e63;
            --accent-dark: #c2185b;
            --text-dark: #1a1a1a;
            --text-light: #666666;
            --bg-gradient: linear-gradient(135deg, #fafafa 0%, #f5f1e8 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden; /* Mantém a página sem rolagem como solicitado */
            font-family: 'Poppins', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-dark);
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Elementos Decorativos de Fundo */
        .bg-decoration {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-decoration::before, .bg-decoration::after {
            content: '';
            position: absolute;
            border-radius: 50%;
        }

        .bg-decoration::before {
            top: -15%;
            right: -10%;
            width: 70vw;
            height: 70vw;
            background: radial-gradient(circle, rgba(233, 30, 99, 0.06) 0%, transparent 70%);
        }

        .bg-decoration::after {
            bottom: -15%;
            left: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(93, 64, 55, 0.04) 0%, transparent 70%);
        }

        /* Layout Principal */
        .main-content {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 500px;
            height: 100%;
            max-height: 800px;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            justify-content: space-around;
        }

        /* Logo */
        .logo-container {
            width: min(150px, 30vw);
            height: min(150px, 30vw);
            border-radius: 50%;
            background: linear-gradient(135deg, #5d4037 0%, #3e2723 100%);
            padding: 5px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .logo-inner img {
            width: 80%;
            height: auto;
            object-fit: contain;
        }

        /* Textos */
        .text-section {
            width: 100%;
        }

        .promo-label {
            font-size: clamp(0.75rem, 2vh, 0.85rem);
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--text-light);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            display: block;
        }

        .heading {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.6rem, 6vh, 2.2rem);
            font-weight: 700;
            color: var(--primary-dark);
            line-height: 1.2;
            margin-bottom: 0.5rem;
        }

        .promo-value {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3.5rem, 12vh, 5rem);
            font-weight: 700;
            color: var(--accent-pink);
            line-height: 1;
            margin: 0.5rem 0;
        }

        .promo-description {
            font-size: clamp(0.9rem, 2.2vh, 1rem);
            color: var(--text-light);
            max-width: 85%;
            margin: 0 auto;
        }

        /* Botão CTA */
        .action-section {
            width: 100%;
        }

        .cta-button {
            display: inline-block;
            width: 100%;
            max-width: 300px;
            padding: 1.1rem 1.5rem;
            background: var(--accent-pink);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            transition: background 0.3s ease, transform 0.2s ease;
            box-shadow: 0 8px 20px rgba(233, 30, 99, 0.2);
            border: none;
            cursor: pointer;
        }

        .cta-button:hover {
            background: var(--accent-dark);
            transform: translateY(-2px);
        }

        .footer-info {
            margin-top: 1rem;
            font-size: 0.7rem;
            color: #999;
            font-weight: 400;
        }

        /* Otimização de animação para não afetar o CLS */
        .fade-in {
            animation: fadeIn 0.6s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }

    </style>
</head>
<body>

    <div class="bg-decoration"></div>

    <main class="main-content">
        <header class="logo-container fade-in">
            <div class="logo-inner">
                <!-- Certifique-se de que o arquivo logo.png esteja no mesmo diretório -->
                <img src="logo.png" alt="Logo Dolce Gusto" width="120" height="120">
            </div>
        </header>

        <section class="text-section fade-in delay-1">
            <span class="promo-label">Oferta Exclusiva</span>
            <h1 class="heading">Sabor Incomparável<br>com Desconto</h1>
            <div class="promo-value">40% OFF</div>
            <p class="promo-description">Em cápsulas e máquinas selecionadas. Garanta o seu café perfeito.</p>
        </section>

        <footer class="action-section fade-in delay-2">
            <button id="cta-button" class="cta-button">Aproveitar Agora</button>
            <div class="footer-info">
                *Promoção válida enquanto durarem os estoques.
            </div>
        </footer>
    </main>

    <script>
        // URL de destino final (Landing Page)
        const DESTINATION_URL = 'https://vitaldue.myshopify.com/products/comboseiscaixas';

        document.getElementById('cta-button').addEventListener('click', function(e) {
            e.preventDefault();
            const btn = this;
            
            // Feedback visual imediato (importante para evitar múltiplos cliques)
            btn.style.opacity = '0.7';
            btn.textContent = 'Redirecionando...';
            
            // Redirecionamento direto para evitar bloqueios de pop-up
            window.location.href = DESTINATION_URL;
        });
    </script>

</body>
</html>
